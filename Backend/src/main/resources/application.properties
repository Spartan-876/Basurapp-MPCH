spring.application.name=Basurapp

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_basurapp}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.fail-on-empty-beans=false

app.firebase-config-file=${FIREBASE_ACCOUNT_PATH:classpath:firebase-service-account.json}
app.jwt-secret=${JWT_SECRET:clave_temporal_solo_para_dev_1234567890}
